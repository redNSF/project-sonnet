<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop All Plans — InfinityDigitalShop</title>
  <meta name="description" content="Browse all premium subscription plans. Netflix, Spotify, Adobe, ChatGPT, Midjourney and 15+ more services at discounted prices.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <script src="assets/js/theme-init.js"></script>
</head>
<body>

<div id="ambient-bg">
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>
  <div class="ambient-orb orb-3"></div>
</div>

<div id="nav-placeholder"></div>

<main>
  <section class="section">
    <div class="container">

      <!-- Page Header -->
      <div style="margin-bottom:32px;">
        <p class="eyebrow" style="margin-bottom:8px;">Catalog</p>
        <h1 class="section-title">All Plans</h1>
      </div>

      <!-- Search Bar -->
      <div class="search-input-wrap" style="margin-bottom:24px;">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="shop-search" class="search-input" placeholder="Search subscriptions…" autocomplete="off">
      </div>

      <!-- Filter Bar -->
      <div class="flex-between" style="margin-bottom:32px;flex-wrap:wrap;gap:12px;">
        <div class="filter-tabs">
          <button class="filter-tab active" data-cat="all">All</button>
          <button class="filter-tab" data-cat="streaming">Streaming</button>
          <button class="filter-tab" data-cat="ai-tools">AI Tools</button>
          <button class="filter-tab" data-cat="creative">Creative</button>
          <button class="filter-tab" data-cat="productivity">Productivity</button>
          <button class="filter-tab" data-cat="education">Education</button>
          <button class="filter-tab" data-cat="vpn">VPN</button>
        </div>
        <select id="shop-sort" class="sort-select">
          <option value="popular">Most Popular</option>
          <option value="newest">Newest</option>
          <option value="az">A → Z</option>
        </select>
      </div>

      <!-- Products Grid -->
      <div class="grid-4" id="products-grid">
        <!-- Rendered by shop.js -->
      </div>

    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/ScrollTrigger.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/shop.js"></script>
<script src="assets/js/animations.js"></script>
</body>
</html>
