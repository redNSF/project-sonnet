<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — InfinityDigitalShop</title>
  <meta name="description" content="Sign in to your InfinityDigitalShop account to access your subscriptions and order history.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <script src="assets/js/theme-init.js"></script>
</head>
<body>

<div id="ambient-bg">
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>
  <div class="ambient-orb orb-3"></div>
</div>

<div id="nav-placeholder"></div>

<div class="auth-page">
  <div class="auth-card">

    <a href="index.html" class="auth-logo">InfinityDigitalShop</a>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to manage your subscriptions</p>

    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input type="email" id="login-email" class="form-input" placeholder="john@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password" style="display:flex;justify-content:space-between;">
          <span>Password</span>
          <a href="#" style="color:var(--color-text-muted);font-size:12px;transition:color .3s;" onmouseover="this.style.color='var(--color-text)'" onmouseout="this.style.color='var(--color-text-muted)'">Forgot password?</a>
        </label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="btn btn-primary btn-full" style="margin-top:24px;" id="login-btn">Sign In</button>

    <div class="auth-divider">
      <div class="auth-divider-line"></div>
      <span class="auth-divider-text">or continue with</span>
      <div class="auth-divider-line"></div>
    </div>

    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-switch">
      Don't have an account? <a href="register.html">Create one →</a>
    </div>

  </div>
</div>

<script src="assets/js/main.js"></script>
<script>
document.getElementById('login-btn').addEventListener('click', () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  if (!email || !pass) {
    window.SubStore?.showToast('Please fill in all fields', 'error');
    return;
  }
  if (!/\S+@\S+\.\S+/.test(email)) {
    window.SubStore?.showToast('Enter a valid email address', 'error');
    return;
  }
  window.SubStore?.showToast('Signing in…');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
});
</script>
</body>
</html>
