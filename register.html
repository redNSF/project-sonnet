<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — InfinityDigitalShop</title>
  <meta name="description" content="Create your free InfinityDigitalShop account to start buying discounted premium subscriptions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <script src="assets/js/theme-init.js"></script>
</head>
<body>

<div id="ambient-bg">
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>
  <div class="ambient-orb orb-3"></div>
</div>

<div id="nav-placeholder"></div>

<div class="auth-page">
  <div class="auth-card">

    <a href="index.html" class="auth-logo">InfinityDigitalShop</a>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Start accessing premium services at a fraction of the price</p>

    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name</label>
        <input type="text" id="reg-name" class="form-input" placeholder="John Smith" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email Address</label>
        <input type="email" id="reg-email" class="form-input" placeholder="john@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input type="password" id="reg-password" class="form-input" placeholder="At least 8 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-confirm">Confirm Password</label>
        <input type="password" id="reg-confirm" class="form-input" placeholder="Repeat your password" autocomplete="new-password">
      </div>
    </div>

    <p style="font-size:12px;color:var(--color-text-muted);line-height:1.6;margin-top:16px;">By creating an account you agree to our <a href="#" style="color:var(--color-text-muted);text-decoration:underline;">Terms of Service</a> and <a href="#" style="color:var(--color-text-muted);text-decoration:underline;">Privacy Policy</a>.</p>

    <button class="btn btn-primary btn-full" style="margin-top:20px;" id="register-btn">Create Account</button>

    <div class="auth-divider">
      <div class="auth-divider-line"></div>
      <span class="auth-divider-text">or continue with</span>
      <div class="auth-divider-line"></div>
    </div>

    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>

  </div>
</div>

<script src="assets/js/main.js"></script>
<script>
document.getElementById('register-btn').addEventListener('click', () => {
  const name    = document.getElementById('reg-name').value.trim();
  const email   = document.getElementById('reg-email').value.trim();
  const pass    = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;

  if (!name || !email || !pass || !confirm) {
    window.SubStore?.showToast('Please fill in all fields', 'error');
    return;
  }
  if (!/\S+@\S+\.\S+/.test(email)) {
    window.SubStore?.showToast('Enter a valid email address', 'error');
    return;
  }
  if (pass.length < 8) {
    window.SubStore?.showToast('Password must be at least 8 characters', 'error');
    return;
  }
  if (pass !== confirm) {
    window.SubStore?.showToast('Passwords do not match', 'error');
    return;
  }
  window.SubStore?.showToast('Account created! Redirecting…');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
});
</script>
</body>
</html>
